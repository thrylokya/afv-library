query MaintenanceRequests(
	$first: Int
	$after: String
	$where: Maintenance_Request__c_Filter
	$orderBy: Maintenance_Request__c_OrderBy
) {
	uiapi {
		query {
			Maintenance_Request__c(first: $first, after: $after, where: $where, orderBy: $orderBy) {
				edges {
					node {
						Id
						ApiName
						Name @optional {
							value
							displayValue
						}
						Description__c @optional {
							value
							displayValue
						}
						Type__c @optional {
							value
							displayValue
						}
						Priority__c @optional {
							value
							displayValue
						}
						Status__c @optional {
							value
							displayValue
						}
						Scheduled__c @optional {
							value
							displayValue
						}
						User__r @optional {
							Name @optional {
								value
								displayValue
							}
						}
						Property__r @optional {
							Address__c @optional {
								value
								displayValue
							}
						}
					}
					cursor
				}
				pageInfo {
					hasNextPage
					endCursor
				}
			}
		}
	}
}
